<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab GPU Bot Click</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <h1>Labgpubot Click Test</h1>
    <p class="subtitle">One click sends one email.</p>

    <div class="card">
      <label for="requester">Your name or ID</label>
      <input id="requester" type="text" placeholder="manikm">

      <label for="server">Server</label>
      <input id="server" type="text" placeholder="axis0">

      <label for="issue">Issue</label>
      <input id="issue" type="text" placeholder="GPU unavailable">

      <label for="note">Optional note</label>
      <input id="note" type="text" placeholder="Testing click email">

      <button id="sendBtn">Send Click Email</button>
      <p id="status">Ready.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="click-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
